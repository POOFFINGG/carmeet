name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build meet-app
        working-directory: artifacts/meet-app
        env:
          BASE_PATH: /carmeet/
          NODE_ENV: production
        run: pnpm run build

      - name: Copy 404.html for SPA routing
        run: cp artifacts/meet-app/dist/public/index.html artifacts/meet-app/dist/public/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/meet-app/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
